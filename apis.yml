description: >-
  Western Midstream Partners (WES) is a midstream energy company that owns and
  operates oil, natural gas, and water gathering systems, natural gas processing
  plants, oil treating facilities, and crude oil, natural gas, and NGLs pipelines.
  The company operates primarily in the Delaware Basin and DJ Basin, handling
  the transportation and processing of hydrocarbons and produced water.
